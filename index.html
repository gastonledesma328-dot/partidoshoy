<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partidos Hoy</title>

<style>
:root {
  --bg: #020617;
  --card: #0f172a;
  --border: #1e293b;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --accent: #22c55e;
}

body {
  margin: 0;
  background: var(--bg);
  font-family: Inter, system-ui, sans-serif;
  color: var(--text);
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: #020617;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-weight: 700;
  font-size: 18px;
}

.actions {
  display: flex;
  gap: 10px;
}

.icon {
  width: 36px;
  height: 36px;
  background: var(--card);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* TABS */
.tabs {
  display: flex;
  gap: 10px;
  padding: 10px 20px;
}

.tab {
  padding: 8px 14px;
  border-radius: 999px;
  background: var(--card);
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
}

.tab.active {
  background: var(--accent);
  color: black;
}

/* GRID */
.container {
  padding: 20px;
  display: grid;
  gap: 12px;
}

/* CARD */
.card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(180deg,#020617,#0f172a);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  transition: 0.2s;
}

.card:hover {
  border-color: var(--accent);
  transform: scale(1.01);
}

/* LEFT */
.left {
  display: flex;
  flex-direction: column;
}

.league {
  font-size: 12px;
  color: var(--muted);
}

.match {
  font-size: 15px;
  margin-top: 4px;
}

/* RIGHT */
.right {
  text-align: right;
}

.time {
  font-size: 14px;
  color: var(--accent);
}

.live {
  font-size: 11px;
  color: #ef4444;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">⚽ Partidos.Hoy</div>

  <div class="actions">
    <div class="icon">🔍</div>
    <div class="icon">📅</div>
    <div class="icon">👤</div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active">Hoy</div>
  <div class="tab">Mañana</div>
  <div class="tab">En Vivo</div>
</div>

<!-- CONTENIDO -->
<div class="container" id="app"></div>

<script>
const partidos = [
  {
    liga: "Premier League",
    equipos: "Arsenal vs Chelsea",
    hora: "16:00",
    stream: "https://test.m3u8",
    live: true
  },
  {
    liga: "La Liga",
    equipos: "Real Madrid vs Barcelona",
    hora: "18:30",
    stream: "https://test.m3u8",
    live: false
  }
];

const app = document.getElementById("app");

partidos.forEach(p => {
  const el = document.createElement("div");
  el.className = "card";

  el.innerHTML = `
    <div class="left">
      <div class="league">${p.liga}</div>
      <div class="match">${p.equipos}</div>
    </div>

    <div class="right">
      <div class="time">${p.hora}</div>
      ${p.live ? '<div class="live">EN VIVO</div>' : ''}
    </div>
  `;

  el.onclick = () => {
    window.location.href = "player.html?url=" + encodeURIComponent(p.stream);
  };

  app.appendChild(el);
});
</script>

</body>
</html>
