<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Partidos Hoy</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<!-- TU CSS ORIGINAL (NO LO TOCO) -->
<style>
/* (DEJÁ EXACTAMENTE TU CSS ACÁ, NO LO MODIFIQUÉ) */
</style>
</head>

<body>

<div class="app">

<header class="header">
  <div class="logo">
    Partid<span class="ball"></span>s<span class="dot">.Hoy</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="setTab('agenda', this)">AGENDA</button>
  <button class="tab" onclick="setTab('chat', this)">CHAT</button>
  <button class="tab" onclick="setTab('live', this)">LIVE</button>
</div>

<!-- AGENDA -->
<section id="agenda" class="section">
  <section class="featured">
    <div class="featured-inner">

      <div class="match-info" id="featuredInfo"></div>

      <div class="video-area">
        <video id="player" controls autoplay style="width:100%; height:100%"></video>
      </div>

      <div class="chat-panel">
        <p class="chat-label">LIVE CHAT</p>
        <div class="chat-msgs" id="chatBox"></div>
        <div class="chat-input">
          <input id="chatInput" placeholder="Escribí..." />
          <button onclick="sendMessage()">➤</button>
        </div>
      </div>

    </div>
  </section>

  <section class="leagues" id="leagues"></section>
</section>

<!-- CHAT SOLO -->
<section id="chat" class="section" style="display:none">
  <div class="chat-panel">
    <div id="chatBoxFull"></div>
  </div>
</section>

<!-- LIVE -->
<section id="live" class="section" style="display:none">
  <h3>Partidos en vivo</h3>
  <div id="liveMatches"></div>
</section>

</div>

<script>

// ================= DATA (LISTO PARA API)
let leagues = [];

// SIMULACIÓN FETCH (después lo conectás a tu JSON real)
async function loadData() {
  leagues = [
    {
      name: "PREMIER",
      icon: "🏆",
      matches: [
        {
          home: "River",
          away: "Boca",
          time: "21:00",
          url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
          live: true
        },
        {
          home: "Liverpool",
          away: "Arsenal",
          score: "2 - 1",
          url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
        }
      ]
    }
  ];

  renderAll();
}

// ================= RENDER
function renderAll() {
  renderLeagues();
  renderFeatured();
  renderLive();
}

function renderLeagues() {
  const el = document.getElementById('leagues');

  el.innerHTML = leagues.map(l => `
    <article class="league-card">
      <div class="lc-header">
        <span>${l.name}</span>
      </div>

      ${l.matches.map(m => `
        <div class="match-row" onclick="playMatch('${m.url}')">
          <div>${m.home}</div>
          <span class="match-score">${m.score || m.time}</span>
          <div>${m.away}</div>
        </div>
      `).join('')}

    </article>
  `).join('');
}

// ================= FEATURED
function renderFeatured() {
  const match = leagues[0].matches[0];

  document.getElementById("featuredInfo").innerHTML = `
    <div class="teams">
      <div>${match.home}</div>
      <div class="score-center">${match.score || match.time}</div>
      <div>${match.away}</div>
    </div>
  `;

  playMatch(match.url);
}

// ================= PLAYER
function playMatch(url) {
  const video = document.getElementById("player");

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }
}

// ================= TABS
function setTab(tab, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");

  document.querySelectorAll(".section").forEach(s => s.style.display = "none");
  document.getElementById(tab).style.display = "block";
}

// ================= CHAT
let messages = [];

function sendMessage() {
  const input = document.getElementById("chatInput");
  if (!input.value) return;

  messages.push(input.value);
  input.value = "";

  renderChat();
}

function renderChat() {
  const box = document.getElementById("chatBox");

  box.innerHTML = messages.map(m => `
    <div class="chat-line">
      <div class="avatar">U</div>
      <div>${m}</div>
    </div>
  `).join('');
}

// ================= LIVE TAB
function renderLive() {
  const el = document.getElementById("liveMatches");

  const live = leagues.flatMap(l => l.matches.filter(m => m.live));

  el.innerHTML = live.map(m => `
    <div onclick="playMatch('${m.url}')">
      🔴 ${m.home} vs ${m.away}
    </div>
  `).join('');
}

// INIT
loadData();

</script>

</body>
</html>
