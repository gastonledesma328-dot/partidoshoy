<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partidos.Hoy</title>

<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#022c22;
  color:#d1fae5;
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo{
  font-size:22px;
  font-weight:bold;
}

/* ICONS */
.actions{
  display:flex;
  gap:10px;
}

.icon{
  width:40px;
  height:40px;
  border-radius:10px;
  background:#064e3b;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* TABS */
.tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:20px;
}

.tab{
  height:50px;
  border-radius:12px;
  background:#064e3b;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  cursor:pointer;
}

.tab.active{
  background:white;
  color:black;
}

/* FEATURE */
.feature{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  gap:15px;
  margin-bottom:20px;
}

.box{
  background:#064e3b;
  padding:15px;
  border-radius:15px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

/* CARD */
.league-card{
  background:#ecfdf5;
  color:black;
  border-radius:15px;
  padding:15px;
}

.league-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.live{
  background:red;
  color:white;
  padding:2px 6px;
  border-radius:6px;
  font-size:10px;
}

.match{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  margin:5px 0;
}

.score{
  background:#d1fae5;
  padding:3px 8px;
  border-radius:6px;
}

.odds{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:4px;
  margin-top:10px;
}

.odds div{
  background:#d1fae5;
  padding:5px;
  border-radius:6px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">⚽ Partidos.Hoy</div>
    <div class="actions">
      <div class="icon">🔍</div>
      <div class="icon">📅</div>
      <div class="icon">👤</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active">AGENDA DEL DÍA</div>
    <div class="tab">CHAT</div>
    <div class="tab">PARTIDOS EN VIVO</div>
  </div>

  <!-- FEATURE -->
  <div class="feature">
    <div class="box">
      <div>FEATURED MATCH</div>
      <h2>2 - 1</h2>
    </div>

    <div class="box" style="background:black;text-align:center;">
      ▶ VIDEO
    </div>

    <div class="box">
      <div>LIVE CHAT</div>
      <p>Messi goal!!</p>
      <p>Arsenal dominating</p>
    </div>
  </div>

  <!-- LEAGUES -->
  <div class="grid" id="leagues"></div>

</div>

<script>
const leagues = [
  {
    name: "LIGA MX",
    icon: "⚽",
    matches: [
      { home: "Liverpool", away: "Chelsea", homeIcon: "🔴", awayIcon: "🟡", score: "1 - 0" }
    ]
  },
  {
    name: "PREMIER LEAGUE",
    icon: "🏆",
    matches: [
      { home: "River Plate", away: "Boca Juniors", homeIcon: "⚪", awayIcon: "🔵", time: "21:00", odds: ["+1.00","-","-1.00","-","+1.35"] }
    ]
  },
  {
    name: "LA LIGA",
    icon: "🇪🇸",
    matches: [
      { home: "Real Madrid", away: "Barcelona", homeIcon: "⚪", awayIcon: "🔵", score: "2 - 1" }
    ]
  }
];

const container = document.getElementById("leagues");

leagues.forEach(l => {
  const odds = l.matches[0]?.odds || ["+1.00","-","-1.00","-","+1.00"];

  const card = document.createElement("div");
  card.className = "league-card";

  let html = `
    <div class="league-header">
      <div><b>${l.icon} ${l.name}</b></div>
      <div class="live">LIVE</div>
    </div>
  `;

  l.matches.forEach(m => {
    html += `
      <div class="match">
        <div>${m.home} ${m.homeIcon}</div>
        <div class="score">${m.score || m.time}</div>
        <div>${m.awayIcon} ${m.away}</div>
      </div>
    `;
  });

  html += `<div class="odds">`;

  odds.forEach(o => {
    html += `<div>${o}</div>`;
  });

  html += `</div>`;

  card.innerHTML = html;
  container.appendChild(card);
});
</script>

</body>
</html>
