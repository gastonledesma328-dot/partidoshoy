<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partidos Hoy</title>

<style>
:root{
  --bg:#022c22;
  --card:#064e3b;
  --soft:#065f46;
  --border:#065f46;
  --text:#d1fae5;
  --muted:#6ee7b7;
  --accent:#22c55e;
}

body{
  margin:0;
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at top,#064e3b,#022c22);
  color:var(--text);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:20px;
  align-items:center;
}

.logo{
  font-size:22px;
  font-weight:700;
}

.icons{
  display:flex;
  gap:10px;
}

.icon{
  width:40px;
  height:40px;
  border-radius:12px;
  background:var(--card);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:10px;
}

.tab{
  padding:10px 20px;
  border-radius:20px;
  background:var(--card);
  color:var(--muted);
}

.tab.active{
  background:white;
  color:black;
}

/* HERO GRID */
.hero-grid{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  gap:20px;
  padding:20px;
}

/* FEATURE MATCH */
.feature{
  background:var(--card);
  border-radius:16px;
  padding:20px;
}

.score{
  font-size:32px;
  margin:10px 0;
}

.live{
  background:red;
  padding:3px 8px;
  border-radius:6px;
  font-size:10px;
}

/* VIDEO */
.video{
  background:black;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CHAT */
.chat{
  background:var(--card);
  border-radius:16px;
  padding:15px;
}

.chat input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

/* MATCH GRID */
.matches{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:20px;
}

.match-card{
  background:#ecfdf5;
  color:black;
  border-radius:16px;
  padding:15px;
}

.match-header{
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

.row{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

.odds{
  display:flex;
  gap:5px;
  margin-top:10px;
}

.odds div{
  background:#d1fae5;
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">⚽ Partidos.Hoy</div>
  <div class="icons">
    <div class="icon">🔍</div>
    <div class="icon">📅</div>
    <div class="icon">👤</div>
  </div>
</div>

<div class="topbar">
  <div class="tab active">AGENDA DEL DÍA</div>
  <div class="tab">CHAT</div>
  <div class="tab">PARTIDOS EN VIVO</div>
</div>

<div class="hero-grid">

  <!-- FEATURE -->
  <div class="feature">
    <div>FEATURED MATCH</div>
    <div class="score">2 - 1</div>
    <div class="live">LIVE</div>
  </div>

  <!-- VIDEO -->
  <div class="video">
    ▶
  </div>

  <!-- CHAT -->
  <div class="chat">
    <div>LIVE CHAT</div>
    <p>Messi goal!!</p>
    <p>Arsenal dominating</p>
    <input placeholder="Type a message...">
  </div>

</div>

<div class="matches">

  <div class="match-card">
    <div class="match-header">
      <span>LIGA MX</span>
      <span style="color:red;">LIVE</span>
    </div>

    <div class="row">
      <span>Liverpool</span>
      <span>1 - 0</span>
      <span>Chelsea</span>
    </div>

    <div class="odds">
      <div>+1.00</div>
      <div>-1.00</div>
      <div>+0.05</div>
    </div>
  </div>

  <div class="match-card">
    <div class="match-header">
      <span>PREMIER</span>
      <span style="color:red;">LIVE</span>
    </div>

    <div class="row">
      <span>River</span>
      <span>2 - 1</span>
      <span>Boca</span>
    </div>

    <div class="odds">
      <div>+1.00</div>
      <div>-1.00</div>
      <div>+1.35</div>
    </div>
  </div>

</div>

</body>
</html>
