<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partidos Hoy</title>

<style>
:root {
  --bg: #020617;
  --card: #0f172a;
  --border: #1e293b;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --accent: #22c55e;
}

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-weight: bold;
}

/* HERO MATCH */
.hero {
  margin: 20px;
  padding: 20px;
  border-radius: 16px;
  background: linear-gradient(135deg,#0f172a,#020617);
  border: 1px solid var(--border);
}

.hero h2 {
  margin: 0;
  font-size: 18px;
}

.hero .time {
  color: var(--accent);
}

/* TABS */
.tabs {
  display: flex;
  gap: 10px;
  padding: 0 20px 10px;
}

.tab {
  padding: 8px 14px;
  border-radius: 999px;
  background: var(--card);
  color: var(--muted);
  cursor: pointer;
}

.tab.active {
  background: var(--accent);
  color: black;
}

/* SECTION */
.section {
  padding: 10px 20px;
}

.section-title {
  font-size: 14px;
  margin-bottom: 10px;
}

/* CARD */
.card {
  display: flex;
  justify-content: space-between;
  padding: 14px;
  border-radius: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  margin-bottom: 10px;
  transition: 0.2s;
}

.card:hover {
  border-color: var(--accent);
}

.match {
  font-size: 14px;
}

.time {
  color: var(--accent);
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">⚽ Partidos.Hoy</div>
  <div>🔍 📅 👤</div>
</div>

<!-- HERO -->
<div class="hero">
  <h2>Real Madrid vs Barcelona</h2>
  <div class="time">18:30</div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active">Hoy</div>
  <div class="tab">Mañana</div>
</div>

<!-- SECCION -->
<div class="section">
  <div class="section-title">La Liga</div>

  <div class="card">
    <div class="match">Real Madrid vs Barcelona</div>
    <div class="time">18:30</div>
  </div>

  <div class="card">
    <div class="match">Atlético vs Sevilla</div>
    <div class="time">21:00</div>
  </div>

</div>

<script>
// después conectamos JSON real
</script>

</body>
</html>
