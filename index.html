<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partidos Hoy</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b1120;
  color: white;
}

/* HEADER */
.header {
  background: #0f172a;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #1e293b;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  color: #22c55e;
}

/* GRID */
.container {
  padding: 20px;
  display: grid;
  gap: 15px;
}

/* CARD */
.card {
  background: linear-gradient(145deg, #1e293b, #0f172a);
  border-radius: 12px;
  padding: 15px;
  transition: 0.2s;
  border: 1px solid #1e293b;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.02);
  border-color: #22c55e;
}

/* TEXT */
.liga {
  font-size: 12px;
  color: #94a3b8;
}

.match {
  font-size: 16px;
  margin: 5px 0;
}

.time {
  font-size: 13px;
  color: #22c55e;
}
</style>

</head>

<body>

<div class="header">
  <div class="logo">⚽ Partidos Hoy</div>
</div>

<div class="container" id="app"></div>

<script>
const partidos = [
  {
    liga: "Premier League",
    equipos: "Arsenal vs Chelsea",
    hora: "16:00",
    stream: "https://test-stream.m3u8"
  },
  {
    liga: "La Liga",
    equipos: "Real Madrid vs Barça",
    hora: "18:00",
    stream: "https://test-stream.m3u8"
  }
];

const app = document.getElementById("app");

partidos.forEach(p => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <div class="liga">${p.liga}</div>
    <div class="match">${p.equipos}</div>
    <div class="time">${p.hora}</div>
  `;

  card.onclick = () => {
    window.location.href = "player.html?url=" + encodeURIComponent(p.stream);
  };

  app.appendChild(card);
});
</script>

</body>
</html>
