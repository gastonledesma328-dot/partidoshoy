<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Partidos Hoy</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
/* === TU MISMO DISEÑO BASE (ligeramente optimizado) === */
body {
  margin:0;
  font-family: Arial;
  background:#162d24;
  color:#fff;
}

.app {
  max-width:900px;
  margin:auto;
  padding:15px;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.tabs {
  display:flex;
  gap:10px;
  margin:10px 0;
}

.tab {
  flex:1;
  padding:10px;
  cursor:pointer;
  background:#1e3a2f;
  border:none;
  color:white;
}

.tab.active {
  background:#5fcf80;
  color:#000;
}

/* SECCIONES */
.section {
  display:none;
}

.section.active {
  display:block;
}

/* MATCH */
.match {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#1a3228;
  margin-bottom:8px;
  cursor:pointer;
  border-radius:8px;
}

.match:hover {
  transform:scale(1.02);
}

/* VIDEO */
#videoContainer {
  display:none;
  margin-top:15px;
}

video {
  width:100%;
  background:black;
}

/* CHAT */
.chat-box {
  display:flex;
  flex-direction:column;
  gap:10px;
}

.chat-messages {
  height:200px;
  overflow:auto;
  background:#1a3228;
  padding:10px;
}

.chat-input {
  display:flex;
}

.chat-input input {
  flex:1;
  padding:8px;
}

.chat-input button {
  padding:8px;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <h2>⚽ Partidos.Hoy</h2>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('agenda', this)">Agenda</button>
    <button class="tab" onclick="setTab('live', this)">En Vivo</button>
    <button class="tab" onclick="setTab('chat', this)">Chat</button>
  </div>

  <!-- AGENDA -->
  <div id="agenda" class="section active"></div>

  <!-- LIVE -->
  <div id="live" class="section">
    <div id="videoContainer">
      <video id="player" controls autoplay></video>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat" class="section">
    <div class="chat-box">
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input">
        <input id="chatInput" placeholder="Escribí algo...">
        <button onclick="sendMessage()">Enviar</button>
      </div>
    </div>
  </div>

</div>

<script>

/* =========================
   DATA (SIMULA TU API)
========================= */

async function loadMatches() {
  // 🔥 después reemplazás esto por tu JSON real
  return [
    {
      league: "Argentina",
      matches: [
        { home:"River", away:"Boca", url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
        { home:"Racing", away:"Independiente", url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }
      ]
    },
    {
      league: "Europa",
      matches: [
        { home:"Barcelona", away:"Real Madrid", url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }
      ]
    }
  ];
}

/* =========================
   RENDER
========================= */

async function renderAgenda() {
  const data = await loadMatches();
  const container = document.getElementById("agenda");

  container.innerHTML = data.map(l => `
    <h3>${l.league}</h3>
    ${l.matches.map(m => `
      <div class="match" onclick="playMatch('${m.url}')">
        <span>${m.home}</span>
        <strong>vs</strong>
        <span>${m.away}</span>
      </div>
    `).join("")}
  `).join("");
}

/* =========================
   PLAYER
========================= */

function playMatch(url) {
  setTab('live', document.querySelectorAll('.tab')[1]);

  const video = document.getElementById("player");
  const container = document.getElementById("videoContainer");

  container.style.display = "block";

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }
}

/* =========================
   TABS
========================= */

function setTab(tabName, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove("active"));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove("active"));

  document.getElementById(tabName).classList.add("active");
  btn.classList.add("active");
}

/* =========================
   CHAT SIMPLE
========================= */

let messages = [];

function sendMessage() {
  const input = document.getElementById("chatInput");
  const text = input.value;

  if (!text) return;

  messages.push(text);
  input.value = "";
  renderChat();
}

function renderChat() {
  const box = document.getElementById("chatMessages");
  box.innerHTML = messages.map(m => `<div>${m}</div>`).join("");
}

/* =========================
   INIT
========================= */

renderAgenda();

</script>

</body>
</html>
